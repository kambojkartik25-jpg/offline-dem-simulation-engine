services:
  db:
    image: postgres:16
    container_name: dem_sim_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dem_sim}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}
    ports:
      - "5432:5432"
    volumes:
      - dem_sim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dem_sim"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: dem_sim_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEM_SIM_DATABASE_URL: ${DEM_SIM_DATABASE_URL:?Set DEM_SIM_DATABASE_URL in your environment}
      BREWMASTER_ENDPOINT_URL: ${BREWMASTER_ENDPOINT_URL:-https://bq-brewmaster-endpoint.germanywestcentral.inference.ml.azure.com/score}
      BREWMASTER_API_KEY: ${BREWMASTER_API_KEY:-}
      BREWMASTER_VERIFY_TLS: ${BREWMASTER_VERIFY_TLS:-false}
    ports:
      - "8000:8000"

volumes:
  dem_sim_pgdata:
